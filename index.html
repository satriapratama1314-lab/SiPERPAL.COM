<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Siska & Bagus</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #8A7051;
            --secondary-color: #D4AF37;
            --bg-light: #FAFAFA;
            --bg-dark: #2C2621;
            --text-main: #4A4A4A;
            --text-light: #FFFFFF;
            --accent: #E6DFD3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070') no-repeat center center/cover;
            color: var(--text-light);
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 5rem;
            margin-bottom: 10px;
            color: var(--secondary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: var(--text-light);
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .btn:hover {
            background-color: transparent;
            border-color: var(--text-light);
            transform: translateY(-3px);
        }

        /* Section General Styling */
        section {
            padding: 80px 20px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background-color: var(--secondary-color);
            margin: 15px auto 0;
        }

        /* Countdown Section */
        .countdown-container {
            background-color: var(--accent);
            padding: 40px 20px;
            border-radius: 15px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .countdown-box {
            background: var(--text-light);
            padding: 20px;
            border-radius: 10px;
            min-width: 100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .countdown-box span {
            display: block;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            font-family: 'Playfair Display', serif;
        }

        /* RSVP Form Section */
        .rsvp-section {
            background-color: #F4EFE6;
            max-width: 100%;
            width: 100%;
        }

        .rsvp-form {
            max-width: 600px;
            margin: 40px auto 0;
            background: var(--text-light);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
